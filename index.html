<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mock Exam Trial Organiser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/tm-sandbox-config.js"></script>
  <script type="module" src="/js/tm-sandbox.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f7f4ec;color:#23302b;font-family:Inter,system-ui,sans-serif;font-size:15px;line-height:1.5}
    a{color:inherit}

    .wrap{max-width:1160px;margin:0 auto;padding:36px 20px 80px}

    h1{font-size:clamp(24px,4vw,36px);font-weight:700;color:#163f34;letter-spacing:-.02em;margin-bottom:6px}
    .subtitle{color:#6c7b74;margin-bottom:28px;max-width:600px}

    .top-bar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:28px}

    .grid{display:grid;grid-template-columns:280px 1fr;gap:22px;align-items:start}
    @media(max-width:820px){.grid{grid-template-columns:1fr}}

    /* cards */
    .card{background:#fff;border:1px solid #dfe5e0;border-radius:16px;box-shadow:0 4px 18px rgba(22,63,52,.07)}
    .card-head{padding:18px 20px 14px;border-bottom:1px solid #eef1ed}
    .card-head h2{font-size:17px;color:#163f34;font-weight:700}
    .card-head p{font-size:13px;color:#6c7b74;margin-top:3px}
    .card-body{padding:18px 20px}

    /* inputs */
    input,select{font:inherit;color:#23302b;background:#fff;border:1px solid #dfe5e0;border-radius:10px;padding:9px 12px;width:100%;transition:.15s}
    input:focus,select:focus{outline:none;border-color:#1f5d4c;box-shadow:0 0 0 3px #e7f0eb}
    input::placeholder{color:#a0b0a8}
    label.lbl{display:block;font-size:11.5px;font-weight:700;color:#6c7b74;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}

    /* buttons */
    .btn{border:none;border-radius:999px;padding:10px 18px;font:inherit;font-weight:600;font-size:14px;cursor:pointer;transition:.15s}
    .btn-green{background:#1f5d4c;color:#fff}
    .btn-green:hover{background:#163f34}
    .btn-outline{background:#fff;color:#163f34;border:1.5px solid #dfe5e0}
    .btn-outline:hover{border-color:#1f5d4c}
    .btn-sm{padding:7px 14px;font-size:13px}
    .btn-red{background:#fff;color:#b23b3b;border:1.5px solid #eccfcf;font-size:13px;padding:6px 12px;border-radius:999px;cursor:pointer;font:inherit;font-weight:600;transition:.15s}
    .btn-red:hover{background:#fcefef}

    /* roster */
    .add-row{display:flex;gap:8px;margin-bottom:14px}
    .add-row input{flex:1;min-width:0}
    .student-ul{list-style:none;max-height:400px;overflow:auto;display:flex;flex-direction:column;gap:5px}
    .student-ul li{display:flex;align-items:center;gap:8px;background:#e7f0eb;border-radius:10px;padding:8px 10px}
    .s-name{flex:1;font-weight:500;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .s-pill{font-size:11px;background:#fff;border:1px solid #dfe5e0;border-radius:999px;padding:2px 8px;color:#163f34;font-weight:700;white-space:nowrap}
    .x{border:none;background:transparent;color:#a0b0a8;font-size:17px;cursor:pointer;line-height:1;padding:2px 4px;border-radius:4px}
    .x:hover{color:#b23b3b}
    .empty-msg{color:#a0b0a8;font-size:13px;font-style:italic;padding:4px 0}

    /* weeks */
    .weeks{display:flex;flex-direction:column;gap:22px}
    .week-card{border-radius:16px;overflow:hidden;border:1px solid #dfe5e0;box-shadow:0 4px 18px rgba(22,63,52,.07)}
    .week-head{background:#1f5d4c;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .week-head h2{color:#fff;font-size:19px;font-weight:700;display:flex;align-items:center;gap:10px}
    .w-tag{background:rgba(255,255,255,.18);color:#fff;border-radius:999px;font-size:12px;font-weight:600;padding:3px 11px}
    .week-body{background:#fff;padding:18px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}

    /* session cards */
    .sess{border:1.5px solid #dfe5e0;border-radius:14px;padding:16px;background:#f7f4ec;display:flex;flex-direction:column;gap:0}
    .sess-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .badges{display:flex;gap:6px;flex-wrap:wrap}
    .badge{font-size:11px;font-weight:700;border-radius:999px;padding:3px 9px;border:1px solid transparent}
    .badge-campus{background:#163f34;color:#fff;border-color:#163f34}
    .badge-course{background:#c9a44c;color:#3a2e08;border-color:#b8923c}
    .badge-sup{background:#e7f0eb;color:#163f34;border-color:#c0d9c5}
    .badge-mark{background:#f6efda;color:#8a6d1f;border-color:#e0ccaa}
    .badge-none{background:#f1eee6;color:#a0b0a8;border-color:#e3dfd6}
    .f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .f-row.one{grid-template-columns:1fr}
    .f-assign{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    @media(max-width:480px){.f-row,.f-assign{grid-template-columns:1fr}}
    .sub-head{font-size:11.5px;font-weight:700;color:#163f34;text-transform:uppercase;letter-spacing:.05em;margin:4px 0 8px;display:flex;align-items:center;gap:6px}
    .sub-head span{color:#a0b0a8;font-weight:600}
    .assigned-ul{list-style:none;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:6px}
    .assigned-ul li{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid #dfe5e0;border-radius:999px;padding:4px 6px 4px 11px;font-size:13px;font-weight:500}
    .drop-row{display:flex;gap:8px}
    .drop-row select{flex:1}

    footer{margin-top:36px;text-align:center;color:#a0b0a8;font-size:13px}

    .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:#163f34;color:#fff;padding:11px 20px;border-radius:999px;font-weight:600;font-size:14px;opacity:0;pointer-events:none;transition:.22s;z-index:99}
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div class="wrap">

  <div class="top-bar">
    <div>
      <h1>Mock Exam Trial Organiser</h1>
      <p class="subtitle">Add students, set session times for Week 1 and Week 2, then assign a supervisor and marker to each session. Saves automatically.</p>
    </div>
    <button class="btn btn-outline btn-sm" id="resetBtn">Reset everything</button>
  </div>

  <div class="grid">
    <!-- Roster -->
    <aside class="card">
      <div class="card-head">
        <h2>Students</h2>
        <p>Add each student once, then assign to sessions.</p>
      </div>
      <div class="card-body">
        <form id="rosterForm" class="add-row">
          <input id="newName" placeholder="Student name" autocomplete="off" aria-label="Student name">
          <button class="btn btn-green btn-sm" type="submit">Add</button>
        </form>
        <ul class="student-ul" id="studentList"></ul>
      </div>
    </aside>

    <!-- Weeks -->
    <div class="weeks" id="weeksHost"></div>
  </div>

  <footer>Sandbox prototype. Saved in your browser only.</footer>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var KEY = "tm-mock-organiser-v2";
  var uid = function(){ return Math.random().toString(36).slice(2,9); };
  var esc = function(s){
    return (s||"").replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  };

  function defaults(){
    return {
      students: [],
      weeks: [
        { week: 1, sessions: [ mkSess("Saturday", "9:00 AM – 12:00 PM", "Room 1", "Bella Vista") ] },
        { week: 2, sessions: [ mkSess("Saturday", "9:00 AM – 12:00 PM", "Room 1", "Bella Vista") ] }
      ]
    };
  }
  function mkSess(day, time, room, campus){
    return { id: uid(), campus: campus||"", course: "", day: day||"", time: time||"", room: room||"", supervisor: "", marker: "", students: [] };
  }
  var CAMPUSES = ["Bella Vista", "Parramatta"];
  var COURSES = ["Advanced", "Extension 1"];

  var state;
  function load(){
    try{ var d = JSON.parse(localStorage.getItem(KEY)); if(d && d.weeks) return d; }catch(e){}
    return defaults();
  }
  function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

  function toast(msg){
    var t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("on");
    clearTimeout(t._t); t._t = setTimeout(function(){ t.classList.remove("on"); }, 1700);
  }

  function byId(id){ return state.students.find(function(s){ return s.id === id; }); }

  function sessionCount(sid){
    var n = 0;
    state.weeks.forEach(function(w){ w.sessions.forEach(function(s){ if(s.students.indexOf(sid) > -1) n++; }); });
    return n;
  }

  /* ---- RENDER ROSTER ---- */
  function renderRoster(){
    var ul = document.getElementById("studentList");
    ul.innerHTML = "";
    if(!state.students.length){
      ul.innerHTML = '<li style="background:none;padding:4px 0"><span class="empty-msg">No students yet.</span></li>';
      return;
    }
    state.students.forEach(function(st){
      var c = sessionCount(st.id);
      var li = document.createElement("li");
      li.innerHTML = '<span class="s-name">'+esc(st.name)+'</span>'
        + (c ? '<span class="s-pill">'+c+' session'+(c>1?'s':'')+'</span>' : '')
        + '<button class="x" title="Remove" aria-label="Remove">×</button>';
      li.querySelector(".x").onclick = function(){ removeStudent(st.id); };
      ul.appendChild(li);
    });
  }

  /* ---- RENDER WEEKS ---- */
  function renderWeeks(){
    var host = document.getElementById("weeksHost");
    host.innerHTML = "";
    state.weeks.forEach(function(w){
      var total = w.sessions.reduce(function(a,s){ return a + s.students.length; }, 0);
      var div = document.createElement("div");
      div.className = "week-card";
      div.innerHTML =
        '<div class="week-head">'
        + '<h2>Week '+w.week
        + ' <span class="w-tag">'+w.sessions.length+' session'+(w.sessions.length!==1?'s':'')+'</span>'
        + ' <span class="w-tag">'+total+' student'+(total!==1?'s':'')+'</span>'
        + '</h2>'
        + '<button class="btn btn-outline btn-sm" data-week="'+w.week+'">+ Add session</button>'
        + '</div>'
        + '<div class="week-body" id="wb-'+w.week+'"></div>';
      div.querySelector("[data-week]").onclick = function(){
        w.sessions.push(mkSess("","",""));
        save(); renderWeeks();
      };
      host.appendChild(div);
      var body = document.getElementById("wb-"+w.week);
      w.sessions.forEach(function(s){ body.appendChild(buildSession(w, s)); });
    });
  }

  function buildSession(w, s){
    var el = document.createElement("div");
    el.className = "sess";

    function badgesHTML(){
      return '<div class="badges">'
        + (s.campus     ? '<span class="badge badge-campus">'+esc(s.campus)+'</span>'                : '<span class="badge badge-none">No campus</span>')
        + (s.course     ? '<span class="badge badge-course">'+esc(s.course)+'</span>'                : '<span class="badge badge-none">No course</span>')
        + (s.supervisor ? '<span class="badge badge-sup">Supervisor: '+esc(s.supervisor)+'</span>' : '<span class="badge badge-none">No supervisor</span>')
        + (s.marker     ? '<span class="badge badge-mark">Marker: '+esc(s.marker)+'</span>'         : '<span class="badge badge-none">No marker</span>')
        + '</div>';
    }
    function selectOptions(list, current, placeholder){
      var html = '<option value=""'+(current?'':' selected')+'>'+placeholder+'</option>';
      list.forEach(function(c){
        html += '<option value="'+esc(c)+'"'+(current===c?' selected':'')+'>'+esc(c)+'</option>';
      });
      return html;
    }

    el.innerHTML =
      '<div class="sess-top">'+badgesHTML()+'<button class="x" aria-label="Remove session">×</button></div>'
      + '<div class="f-row">'
        + '<div><label class="lbl">Campus</label><select data-f="campus">'+selectOptions(CAMPUSES, s.campus, "Select campus…")+'</select></div>'
        + '<div><label class="lbl">Course</label><select data-f="course">'+selectOptions(COURSES, s.course, "Select course…")+'</select></div>'
      + '</div>'
      + '<div class="f-row">'
        + '<div><label class="lbl">Day</label><input data-f="day" placeholder="e.g. Saturday" value="'+esc(s.day)+'"></div>'
        + '<div><label class="lbl">Room</label><input data-f="room" placeholder="e.g. Room 1" value="'+esc(s.room)+'"></div>'
      + '</div>'
      + '<div class="f-row one"><div><label class="lbl">Timing</label><input data-f="time" placeholder="e.g. 9:00 AM – 12:00 PM" value="'+esc(s.time)+'"></div></div>'
      + '<div class="f-assign">'
        + '<div><label class="lbl">Supervisor</label><input data-f="supervisor" placeholder="Name" value="'+esc(s.supervisor)+'"></div>'
        + '<div><label class="lbl">Marker</label><input data-f="marker" placeholder="Name" value="'+esc(s.marker)+'"></div>'
      + '</div>'
      + '<div class="sub-head">Students <span>('+s.students.length+')</span></div>'
      + '<ul class="assigned-ul"></ul>'
      + '<div class="drop-row"><select></select></div>';

    /* live field sync (inputs + the campus select) */
    el.querySelectorAll("[data-f]").forEach(function(inp){
      var handler = function(){
        var f = inp.getAttribute("data-f");
        s[f] = inp.value;
        save();
        if(f === "campus" || f === "course" || f === "supervisor" || f === "marker"){
          el.querySelector(".sess-top").innerHTML = badgesHTML() + '<button class="x" aria-label="Remove session">×</button>';
          el.querySelector(".sess-top .x").onclick = removeSelf;
        }
      };
      inp.addEventListener("input", handler);
      inp.addEventListener("change", handler);
    });

    /* remove session */
    function removeSelf(){
      if(w.sessions.length === 1 && !confirm("Remove this session? Week "+w.week+" will have no sessions.")) return;
      w.sessions = w.sessions.filter(function(x){ return x.id !== s.id; });
      save(); renderWeeks(); renderRoster();
    }
    el.querySelector(".sess-top .x").onclick = removeSelf;

    /* assigned list */
    var ul = el.querySelector(".assigned-ul");
    if(!s.students.length){
      ul.innerHTML = '<li style="background:none;border:none;padding:2px 0;border-radius:0"><span class="empty-msg">None yet</span></li>';
    } else {
      s.students.forEach(function(sid){
        var st = byId(sid); if(!st) return;
        var li = document.createElement("li");
        li.innerHTML = esc(st.name) + ' <button class="x" aria-label="Unassign">×</button>';
        li.querySelector(".x").onclick = function(){
          s.students = s.students.filter(function(x){ return x !== sid; });
          save(); renderWeeks(); renderRoster();
        };
        ul.appendChild(li);
      });
    }

    /* assign dropdown */
    var sel = el.querySelector(".drop-row select");
    var unassigned = state.students.filter(function(st){ return s.students.indexOf(st.id) === -1; });
    var ph = document.createElement("option");
    if(!state.students.length){ ph.textContent = "Add students first"; sel.disabled = true; }
    else if(!unassigned.length){ ph.textContent = "All students assigned"; sel.disabled = true; }
    else { ph.textContent = "+ Assign a student…"; }
    ph.value = ""; sel.appendChild(ph);
    unassigned.forEach(function(st){
      var o = document.createElement("option"); o.value = st.id; o.textContent = st.name;
      sel.appendChild(o);
    });
    sel.onchange = function(){
      if(!sel.value) return;
      s.students.push(sel.value);
      save(); renderWeeks(); renderRoster();
    };

    return el;
  }

  /* ---- ACTIONS ---- */
  function addStudent(name){
    name = (name||"").trim(); if(!name) return;
    if(state.students.some(function(s){ return s.name.toLowerCase() === name.toLowerCase(); })){
      toast(name+" is already listed"); return;
    }
    state.students.push({ id: uid(), name: name });
    save(); renderRoster(); renderWeeks(); toast("Added "+name);
  }
  function removeStudent(id){
    var st = byId(id); if(!st) return;
    if(!confirm("Remove "+st.name+"? They'll be taken off any sessions too.")) return;
    state.students = state.students.filter(function(s){ return s.id !== id; });
    state.weeks.forEach(function(w){ w.sessions.forEach(function(s){ s.students = s.students.filter(function(x){ return x !== id; }); }); });
    save(); renderRoster(); renderWeeks();
  }

  /* ---- WIRE ---- */
  document.getElementById("rosterForm").onsubmit = function(e){
    e.preventDefault();
    var inp = document.getElementById("newName");
    addStudent(inp.value); inp.value = ""; inp.focus();
  };
  document.getElementById("resetBtn").onclick = function(){
    if(!confirm("Reset everything? All students, times and assignments will be cleared.")) return;
    state = defaults(); save(); renderRoster(); renderWeeks(); toast("Reset done");
  };

  /* ---- BOOT ---- */
  state = load();
  renderRoster();
  renderWeeks();
})();
</script>
</body>
</html>
